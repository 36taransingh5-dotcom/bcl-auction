  .rowx { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
</style>

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Input, Avatar, CountdownTimer } = window.DesignSystem_39a708;
    function Demo() {
      return (
        <div className="grid">
          <div className="group">
            <div className="gt">Buttons</div>
            <div className="rowx">
              <Button variant="primary">Enter Auction Room</Button>
              <Button variant="primary" size="lg">PLACE BID</Button>
              <Button variant="secondary">View Squad</Button>
              <Button variant="accent" accent="gold">Approve Winner</Button>
              <Button variant="accent" accent="green">Go Live</Button>
              <Button variant="ghost" size="sm">Skip</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>
          <div className="group">
            <div className="gt">Badges</div>
            <div className="rowx">
              <Badge status="live" />
              <Badge status="sold" />
              <Badge status="unsold" />
              <Badge status="upcoming" />
              <Badge tone="gold" soft>Batter</Badge>
              <Badge tone="ink">All-Rounder</Badge>
              <Badge tone="sky" soft>Bowler</Badge>
            </div>
          </div>
          <div className="group" style={{display:'flex', gap:32, alignItems:'flex-end'}}>
            <div style={{flex:1}}>
              <div className="gt">Inputs</div>
              <Input label="Search players" placeholder="Name, role…" />
            </div>
            <div>
              <div className="gt">Avatars</div>
              <div className="rowx">
                <Avatar name="Rohit Sharma" ring="pink" size={52} />
                <Avatar name="Mumbai Strikers" square ring="gold" size={52} />
                <Avatar name="V K" size={52} />
              </div>
            </div>
            <div>
              <div className="gt">Timer</div>
              <CountdownTimer seconds={14} total={20} size={88} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
