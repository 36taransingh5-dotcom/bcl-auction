<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & Cards" subtitle="Rounded friendly UI — 12px buttons, 24px cards, no sharp corners" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bcl-canvas); }
  .row { display: flex; gap: 18px; align-items: center; }
  .box { background: var(--bcl-surface); border: 1px solid var(--bcl-line); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--bcl-ink-2); }
  .lab { font-family: var(--font-body); font-size: 11px; color: var(--bcl-ink-3); text-align: center; margin-top: 6px; }
  .item { text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:72px;height:48px;border-radius:var(--radius-btn)">12</div><div class="lab">Button</div></div>
    <div class="item"><div class="box" style="width:72px;height:72px;border-radius:var(--radius-md)">16</div><div class="lab">Inset</div></div>
    <div class="item"><div class="box" style="width:96px;height:88px;border-radius:var(--radius-card)">24</div><div class="lab">Card</div></div>
    <div class="item"><div class="box" style="width:110px;height:96px;border-radius:var(--radius-lg)">32</div><div class="lab">Hero card</div></div>
    <div class="item"><div class="box" style="width:88px;height:40px;border-radius:var(--radius-pill)">pill</div><div class="lab">Badge / timer</div></div>
  </div>
</body>
</html>
