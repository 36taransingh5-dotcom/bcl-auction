<!-- @dsCard group="Type" viewport="700x180" name="Display Scale" subtitle="Inter Tight, rounded headlines, tight tracking" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bcl-canvas); color: var(--bcl-ink); }
  .line { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .d { font-family: var(--font-display); font-weight: 500; letter-spacing: var(--tracking-display); line-height: 1.05; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--bcl-ink-3); white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><div class="d" style="font-size:46px">Become Champions</div><div class="tag">Hero 72 / 500</div></div>
  <div class="line"><div class="d" style="font-size:32px">Live Auction Room</div><div class="tag">H2 34 / 500</div></div>
  <div class="line"><div class="d" style="font-size:22px; font-weight:600">Featured Players</div><div class="tag">H3 26 / 600</div></div>
</body>
</html>
