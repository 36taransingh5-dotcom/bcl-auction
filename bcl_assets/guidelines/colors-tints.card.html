<!-- @dsCard group="Colors" viewport="700x150" name="Soft Tints & Ink" subtitle="Pale card fills paired with readable accent ink" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bcl-canvas); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--bcl-line); }
  .dot { width: 18px; height: 18px; border-radius: 999px; margin-bottom: 8px; }
  .t { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
  .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--bcl-green-soft)"><div class="dot" style="background:var(--bcl-green)"></div><div class="t" style="color:var(--bcl-green-ink)">Green</div><div class="h" style="color:var(--bcl-green-ink)">#DCE9E0</div></div>
    <div class="sw" style="background:var(--bcl-gold-soft)"><div class="dot" style="background:var(--bcl-gold)"></div><div class="t" style="color:var(--bcl-gold-ink)">Gold</div><div class="h" style="color:var(--bcl-gold-ink)">#F8EDC9</div></div>
    <div class="sw" style="background:var(--bcl-pink-soft)"><div class="dot" style="background:var(--bcl-pink)"></div><div class="t" style="color:var(--bcl-pink-ink)">Pink</div><div class="h" style="color:var(--bcl-pink-ink)">#FFDCE8</div></div>
    <div class="sw" style="background:var(--bcl-sky-soft)"><div class="dot" style="background:var(--bcl-sky)"></div><div class="t" style="color:var(--bcl-sky-ink)">Sky</div><div class="h" style="color:var(--bcl-sky-ink)">#DFF1FF</div></div>
    <div class="sw" style="background:var(--bcl-peach-soft)"><div class="dot" style="background:var(--bcl-peach)"></div><div class="t" style="color:var(--bcl-peach-ink)">Peach</div><div class="h" style="color:var(--bcl-peach-ink)">#FFE5D4</div></div>
  </div>
</body>
</html>
