<!-- @dsCard group="Brand" viewport="700x190" name="Voice & Auction Moments" subtitle="Confident, punchy, community-driven — bidding feels alive" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bcl-canvas); color: var(--bcl-ink); }
  .head { font-family: var(--font-display); font-weight: 600; font-size: 26px; letter-spacing: -1px; margin-bottom: 4px; }
  .sub { font-family: var(--font-body); font-size: 13px; color: var(--bcl-ink-2); margin-bottom: 16px; }
  .moments { display: flex; gap: 10px; }
  .m { flex: 1; border-radius: var(--radius-md); padding: 12px 14px; }
  .mlab { font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
  .mval { font-family: var(--font-display); font-weight: 800; font-size: 18px; margin-top: 4px; }
</style>
</head>
<body>
  <div class="head">Bid. Build. Become Champions.</div>
  <div class="sub">Short, confident, action-first. Cricket warmth — never a betting app.</div>
  <div class="moments">
    <div class="m" style="background:var(--bcl-pink); color:#fff"><div class="mlab">● Live</div><div class="mval">Rohit Sharma</div></div>
    <div class="m" style="background:var(--bcl-gold); color:var(--bcl-gold-ink)"><div class="mlab">Sold to</div><div class="mval">₹ 6.20 CR</div></div>
    <div class="m" style="background:var(--bcl-surface); color:var(--bcl-ink-3); border:1px solid var(--bcl-line)"><div class="mlab">Unsold</div><div class="mval">Next player →</div></div>
  </div>
</body>
</html>
