<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bcl-canvas); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--bcl-pink); border-radius: 4px; width: 100%; }
  .b { width: 28px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--bcl-ink-3); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar b" style="height:4px"></div><div class="lab">4</div></div>
    <div class="item"><div class="bar b" style="height:8px"></div><div class="lab">8</div></div>
    <div class="item"><div class="bar b" style="height:12px"></div><div class="lab">12</div></div>
    <div class="item"><div class="bar b" style="height:16px"></div><div class="lab">16</div></div>
    <div class="item"><div class="bar b" style="height:24px"></div><div class="lab">24</div></div>
    <div class="item"><div class="bar b" style="height:32px"></div><div class="lab">32</div></div>
    <div class="item"><div class="bar b" style="height:48px"></div><div class="lab">48</div></div>
    <div class="item"><div class="bar b" style="height:64px"></div><div class="lab">64</div></div>
  </div>
</body>
</html>
