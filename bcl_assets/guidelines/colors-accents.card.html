<!-- @dsCard group="Colors" viewport="700x150" name="Cricket Accent Palette" subtitle="Green, Gold, Pink, Sky, Peach — the auction card colours" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bcl-canvas); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--bcl-line); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: #fff; }
  .name { font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--bcl-ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--bcl-ink-3); }
  .use { font-family: var(--font-body); font-size: 10px; color: var(--bcl-ink-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bcl-green)"></div><div class="meta"><div class="name">BCL Green</div><div class="hex">#1A5C3A</div><div class="use">Live cards</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bcl-gold)"></div><div class="meta"><div class="name">Pitch Gold</div><div class="hex">#E8B94A</div><div class="use">Winning bids</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bcl-pink)"></div><div class="meta"><div class="name">Auction Pink</div><div class="hex">#FF4D8B</div><div class="use">Spotlights</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bcl-sky)"></div><div class="meta"><div class="name">Sky Blue</div><div class="hex">#8FD3FF</div><div class="use">Stats</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bcl-peach)"></div><div class="meta"><div class="name">Peach</div><div class="hex">#FFB084</div><div class="use">Community</div></div></div>
  </div>
</body>
</html>
