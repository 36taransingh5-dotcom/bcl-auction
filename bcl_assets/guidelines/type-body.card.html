<!-- @dsCard group="Type" viewport="700x180" name="Body & Labels" subtitle="Inter body, uppercase micro-labels, tabular bid numerals" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bcl-canvas); color: var(--bcl-ink); }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--bcl-ink-3); margin-left: auto; white-space: nowrap; }
  p { margin: 0; font-family: var(--font-body); }
  .labels { display: flex; gap: 8px; align-items: center; }
  .lab { padding: 4px 10px; border-radius: 999px; color: #fff; }
</style>
</head>
<body>
  <div class="row"><p style="font-size:18px">Large body — 18px / 400</p><span class="tag">--text-lg</span></div>
  <div class="row"><p style="font-size:16px; color:var(--bcl-ink-2)">Default body for descriptions, stats and nav — 16px.</p><span class="tag">--text-body</span></div>
  <div class="row">
    <div class="labels">
      <span class="bcl-label lab" style="background:var(--bcl-pink)">Live</span>
      <span class="bcl-label lab" style="background:var(--bcl-green)">Sold</span>
      <span class="bcl-label lab" style="background:var(--bcl-ink-3)">Unsold</span>
      <span class="bcl-num" style="font-size:22px; font-weight:800; margin-left:6px">₹ 4.50 CR</span>
    </div>
    <span class="tag">label + bcl-num</span>
  </div>
</body>
</html>
